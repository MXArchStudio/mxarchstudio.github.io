<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healing the Tulou — MX STUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --ink: #111111;
    --grey: #8C8C8C;
    --line: #EBEBEB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }

  /* ---------- logo bar (non-sticky) ---------- */
  .logo-bar {
    padding: 26px 5vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-bar .logo img {
    height: 300px;
    width: auto;
    display: block;
  }

  /* ---------- nav (sticky) ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 5vw;
    border-bottom: 1px solid var(--line);
  }
  header .back {
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
  }
  header nav ul { display: flex; gap: 36px; }
  header nav a {
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* ---------- project header ---------- */
  .project-head {
    padding: 8vh 5vw 5vh;
    text-align: center;
  }
  .project-head .idx {
    font-size: 0.75rem;
    color: var(--grey);
    font-weight: 700;
    margin-bottom: 14px;
    display: block;
  }
  .project-head h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
  }
  .project-head .meta {
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--grey);
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }

  /* ---------- hero image ---------- */
  .hero-img {
    padding: 0 5vw;
  }
  .hero-img img {
  width: 50%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: #F2F2F2;
  margin: 0 auto;
  }

  /* ---------- description ---------- */
  .desc {
  max-width: 1000px;
  margin: 3vh auto;
  margin-bottom: 60px;
  padding: 0 5vw;
  }
  .desc p {
    font-size: 1.15rem;
    line-height: 1.7;
    color: var(--ink);
    text-align: center;
  }
  .desc p + p { margin-top: 20px; }

  /* ---------- gallery ---------- */
  .gallery {
    display: flex;
    flex-direction: column;
    gap: 3vh;
    padding: 0 5vw 10vh;
  }
  .gallery img {
    width: 100%;
    object-fit: cover;
    display: block;
    background: #F2F2F2;
  }

  /* ---------- prev/next ---------- */
  .project-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 2vh 5vw;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(6px);
  border-top: 1px solid var(--line);
  font-size: 1rem;
  z-index: 40;
  }
  .project-nav a { color: var(--grey); }
  .project-nav a:hover { color: var(--ink); }

  /* ---------- contact / footer ---------- */
  footer {
    padding: 10vh 5vw 5vh;
    border-top: 1px solid var(--line);
    padding-bottom: 80px;
  }
  footer .label {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444444;
    margin-bottom: 28px;
    display: block;
  }
  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 60px;
    margin-bottom: 60px;
  }
  .contact-row a {
    font-size: 1rem;
    font-weight: 300;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, opacity 0.2s;
  }
  .contact-row a:hover { border-color: var(--ink); }

  .foot-bottom {
    display: flex;
    justify-content: space-between;
    /*align-items: center;*/
    flex-wrap: wrap;
    gap: 16px;
    font-size: 0.75rem;
    color: var(--grey);
  }

  @media (max-width: 560px) {
    .contact-row { flex-direction: column; gap: 16px; }
  }

  @media (max-width: 700px) {
  .project-head h1 { font-size: 1.8rem; }
  .project-head .meta { font-size: 0.75rem; gap: 14px; }
  .desc p { font-size: 1rem; }
  .desc { margin: 30px auto; padding: 0 6vw; }
  .logo-bar .logo img { height: 120px; }
  footer .label { font-size: 1.1rem; }
  .contact-row a { font-size: 0.95rem; }
  .gallery-tulou img { width: 100%; }
}
</style>
</head>
