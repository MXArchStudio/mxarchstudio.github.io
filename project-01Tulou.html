<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>城市边界 — MX STUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --ink: #111111;
    --grey: #8C8C8C;
    --line: #EBEBEB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }

  /* ---------- logo bar (non-sticky) ---------- */
  .logo-bar {
    padding: 26px 5vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-bar .logo img {
    height: 96px;
    width: auto;
    display: block;
  }

  /* ---------- nav (sticky) ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 5vw;
    border-bottom: 1px solid var(--line);
  }
  header .back {
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
  }
  header nav ul { display: flex; gap: 36px; }
  header nav a {
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* ---------- project header ---------- */
  .project-head {
    padding: 8vh 5vw 5vh;
    text-align: center;
  }
  .project-head .idx {
    font-size: 0.75rem;
    color: var(--grey);
    font-weight: 700;
    margin-bottom: 14px;
    display: block;
  }
  .project-head h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
  }
  .project-head .meta {
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--grey);
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }

  /* ---------- hero image ---------- */
  .hero-img {
    padding: 0 5vw;
  }
  .hero-img img {
    width: 100%;
    max-height: 85vh;
    object-fit: cover;
    display: block;
    background: #F2F2F2;
  }

  /* ---------- description ---------- */
  .desc {
    max-width: 720px;
    margin: 8vh auto;
    padding: 0 5vw;
  }
  .desc p {
    font-size: 1.15rem;
    line-height: 1.7;
    color: var(--ink);
  }
  .desc p + p { margin-top: 20px; }

  /* ---------- gallery ---------- */
  .gallery {
    display: flex;
    flex-direction: column;
    gap: 3vh;
    padding: 0 5vw 10vh;
  }
  .gallery img {
    width: 100%;
    object-fit: cover;
    display: block;
    background: #F2F2F2;
  }

  /* ---------- prev/next ---------- */
  .project-nav {
    display: flex;
    justify-content: space-between;
    padding: 6vh 5vw;
    border-top: 1px solid var(--line);
    font-size: 0.85rem;
  }
  .project-nav a { color: var(--grey); }
  .project-nav a:hover { color: var(--ink); }

  /* ---------- contact / footer ---------- */
  footer {
    padding: 10vh 5vw 5vh;
    border-top: 1px solid var(--line);
  }
  footer .label {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444444;
    margin-bottom: 28px;
    display: block;
  }
  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 60px;
    margin-bottom: 60px;
  }
  .contact-row a {
    font-size: 1rem;
    font-weight: 300;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, opacity 0.2s;
  }
  .contact-row a:hover { border-color: var(--ink); }

  .foot-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 0.75rem;
    color: var(--grey);
  }

  @media (max-width: 560px) {
    .contact-row { flex-direction: column; gap: 16px; }
  }
</style>
</head>
<body>

<div class="logo-bar">
  <a href="index.html" class="logo"><img src="logo.png" alt="MX Architecture Studio"></a>
</div>

<header>
  <a href="index.html" class="back">← 返回 Work</a>
  <nav>
    <ul>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="project-head">
  <span class="idx">02</span>
  <h1>城市边界</h1>
  <div class="meta">
    <span>品牌视觉 · 2025</span>
    <span>协作：XX、XX</span>
    <span>地点：瑞典</span>
  </div>
</section>

<div class="hero-img">
  <img src="https://picsum.photos/id/1025/1600/1000" alt="城市边界 主图">
</div>

<section class="desc">
  <p>这里写这个项目的介绍文字——项目背景、你参与的部分、想传达的想法。一两段话就够，不用太长。</p>
  <p>可以补充一些细节：用了什么材料/工具、遇到的挑战、最终呈现的效果。</p>
</section>

<section class="gallery">
  <img src="https://picsum.photos/id/1043/1600/1000" alt="城市边界 图2">
  <img src="https://picsum.photos/id/1069/1600/1000" alt="城市边界 图3">
</section>

<div class="project-nav">
  <a href="project-01.html">← 上一个项目</a>
  <a href="project-03.html">下一个项目 →</a>
</div>

<footer id="contact">
  <span class="label">开始一个项目</span>
  <div class="contact-row">
    <a href="mailto:hello@mxstudio.com">hello@mxstudio.com</a>
    <a href="tel:+8613800000000">+86 138 0000 0000</a>
  </div>
  <div class="foot-bottom">
    <span>© 2026 MX STUDIO</span>
  </div>
</footer>

</body>
</html>
